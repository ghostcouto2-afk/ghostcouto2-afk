<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operações Militares | Comando</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #1a1a1a;
            color: #d4d4d4;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #2b3024; /* Verde Oliva Escuro */
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid #4b5320;
        }
        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background-color: #222;
            border: 1px solid #4b5320;
        }
        .img-box {
            width: 100%;
            height: 400px;
            background-image: url('https://images.unsplash.com');
            background-size: cover;
            background-position: center;
            border: 2px solid #4b5320;
            margin-bottom: 20px;
        }
        h1 { color: #8fa372; }
        p { line-height: 1.6; }
        .btn {
            display: inline-block;
            background-color: #4b5320;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
        }
        .btn:hover { background-color: #626d2d; }
    </style>
</head>
<body>

    <header>
        <h1>COMANDO DE OPERAÇÕES E ESTRATÉGIA</h1>
    </header>

    <div class="container">
        <!-- Espaço da Imagem -->
        <div class="img-box"></div>

        <h2>Missão e Visão</h2>
        <p>A defesa do território nacional e a manutenção da soberania são os pilares fundamentais desta unidade. Atuamos em missões de reconhecimento, logística e proteção de fronteiras.</p>
        
        <p><i>"Braço Forte, Mão Amiga."</i></p>

        <a href="#" class="btn">Ver Relatórios</a>
    </div>

</body>
</html>
